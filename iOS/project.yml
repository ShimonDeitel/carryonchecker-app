name: CarryOnChecker
options:
  bundleIdPrefix: com.shimondeitel.carryonchecker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CarryOnChecker:
    type: application
    platform: iOS
    sources:
      - path: CarryOnChecker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carryonchecker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CarryOnChecker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CarryOnCheckerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CarryOnCheckerTests
      - path: CarryOnChecker.storekit
    dependencies:
      - target: CarryOnChecker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carryonchecker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CarryOnCheckerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CarryOnCheckerUITests
    dependencies:
      - target: CarryOnChecker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carryonchecker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CarryOnChecker:
    build:
      targets:
        CarryOnChecker: all
        CarryOnCheckerTests: [test]
        CarryOnCheckerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CarryOnChecker.storekit
    test:
      config: Debug
      storeKitConfiguration: CarryOnChecker.storekit
      targets:
        - CarryOnCheckerTests
        - CarryOnCheckerUITests
    archive:
      config: Release
